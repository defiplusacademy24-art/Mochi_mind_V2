kind = "web"
previewPath = "/"
title = "MochiMind"
version = "1.0.0"
id = "artifacts/mochi-mind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22464

[services.development]
run = "pnpm --filter @workspace/mochi-mind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mochi-mind", "run", "build" ]
publicDir = "artifacts/mochi-mind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22464"
BASE_PATH = "/"
